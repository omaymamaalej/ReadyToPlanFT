<nb-card>
  <nb-card-header>Produits / Services</nb-card-header>
  <nb-card-body>
    <form [formGroup]="productForm">
      <div formArrayName="items">
        <div *ngFor="let item of items.controls; let i = index" [formGroupName]="i" class="mb-4 border p-3 rounded bg-light">
          <div class="row">
            <div class="col-md-6">
              <label>Nom :</label>
              <input nbInput fullWidth formControlName="nameProductOrService" placeholder="Nom du produit/service" />
            </div>
            <div class="col-md-6">
              <label>Description :</label>
              <input nbInput fullWidth formControlName="productDescription" placeholder="Description" />
            </div>
          </div>

          <div class="row mt-2">
            <div class="col-md-4">
              <label>Prix unitaire (€) :</label>
              <input nbInput fullWidth type="number" formControlName="unitPrice" (input)="updateRevenue(i)" />
            </div>
            <div class="col-md-4">
              <label>Ventes mensuelles estimées :</label>
              <input nbInput fullWidth type="number" formControlName="estimatedMonthlySales" (input)="updateRevenue(i)" />
            </div>
            <div class="col-md-4">
              <label>Durée (mois) :</label>
              <input nbInput fullWidth type="number" formControlName="durationInMonths" (input)="updateRevenue(i)" />
            </div>
          </div>

          <div class="mt-2">
            <strong>Revenu estimé total : {{ calculatedRevenues[i] | number:'1.0-0' }} €</strong>
           <button *ngIf="!isEditMode" nbButton size="tiny" status="danger" (click)="removeItem(i)" class="float-end mt-1">Supprimer</button>

          </div>
        </div>
      </div>

     <div class="mt-3" *ngIf="!isEditMode">
  <button nbButton status="success" (click)="addItem()">Ajouter un produit</button>
</div>

      <div class="mt-4">
        <strong class="text-primary">Revenu total global : {{ totalRevenue | number:'1.0-0' }} €</strong>
      </div>

      <div class="buttons-row mt-4">
      <button (click)="submit()" nbButton status="success">
  Enregistrer
</button>
      </div>
    </form>
  </nb-card-body>
</nb-card>
